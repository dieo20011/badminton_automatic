<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="icon-wrapper">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2L2 7v10c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-10-5zm0 2.18l8 3.6v7.22c0 4.52-3.13 8.75-8 9.82-4.87-1.07-8-5.3-8-9.82V7.78l8-3.6z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </div>
      <h1>Quản Lý Sân Cầu Lông</h1>
      <p>Đăng nhập để tiếp tục</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="username">Tên đăng nhập</label>
        <input
          id="username"
          type="text"
          formControlName="username"
          placeholder="Nhập tên đăng nhập"
          [class.error]="username?.invalid && username?.touched"
        />
        <div class="error-message" *ngIf="username?.invalid && username?.touched">
          <span *ngIf="username?.errors?.['required']">Vui lòng nhập tên đăng nhập</span>
          <span *ngIf="username?.errors?.['minlength']">Tên đăng nhập phải có ít nhất 3 ký tự</span>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Mật khẩu</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="Nhập mật khẩu"
          [class.error]="password?.invalid && password?.touched"
        />
        <div class="error-message" *ngIf="password?.invalid && password?.touched">
          <span *ngIf="password?.errors?.['required']">Vui lòng nhập mật khẩu</span>
          <span *ngIf="password?.errors?.['minlength']">Mật khẩu phải có ít nhất 4 ký tự</span>
        </div>
      </div>

      <div class="error-message global-error" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" class="login-button" [disabled]="isLoading">
        <span *ngIf="!isLoading">Đăng nhập</span>
        <span *ngIf="isLoading" class="loading-spinner">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none" opacity="0.25"/>
            <path d="M12 2a10 10 0 0 1 10 10" stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round"/>
          </svg>
          Đang xử lý...
        </span>
      </button>
    </form>

    <div class="login-footer">
      <p>Don't have an account? <a routerLink="/register">Register</a></p>
    </div>
  </div>
</div>
