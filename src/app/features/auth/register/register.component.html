<div class="register-container">
  <div class="register-card">
    <div class="register-header">
      <div class="avatar-wrapper">
        <img src="/asset/img/avata.jpg" alt="logo" class="avatar-img" />
      </div>
      <h1>Register</h1>
      <p>Create an account to manage courts</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="register-form">
      <div class="form-group">
        <label for="fullName">Full name</label>
        <input
          id="fullName"
          type="text"
          formControlName="fullName"
          placeholder="Your full name"
          [class.error]="fullName?.invalid && fullName?.touched"
        />
        <div class="error-message" *ngIf="fullName?.invalid && fullName?.touched">
          <span *ngIf="fullName?.errors?.['required'] || fullName?.errors?.['whitespace']">Full name is required</span>
          <span *ngIf="fullName?.errors?.['minlength']">At least 2 characters</span>
        </div>
      </div>

      <div class="form-group">
        <label for="userName">Username</label>
        <input
          id="userName"
          type="text"
          formControlName="userName"
          placeholder="Choose a username"
          [class.error]="userName?.invalid && userName?.touched"
        />
        <div class="error-message" *ngIf="userName?.invalid && userName?.touched">
          <span *ngIf="userName?.errors?.['required'] || userName?.errors?.['whitespace']">Username is required</span>
          <span *ngIf="userName?.errors?.['minlength']">At least 3 characters</span>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="your@email.com"
          [class.error]="email?.invalid && email?.touched"
        />
        <div class="error-message" *ngIf="email?.invalid && email?.touched">
          <span *ngIf="email?.errors?.['required'] || email?.errors?.['whitespace']">Email is required</span>
          <span *ngIf="email?.errors?.['email']">Invalid email</span>
          <span *ngIf="email?.errors?.['pattern']">{{ errorEmailMessage }}</span>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="At least 4 characters"
          [class.error]="password?.invalid && password?.touched"
        />
        <div class="error-message" *ngIf="password?.invalid && password?.touched">
          <span *ngIf="password?.errors?.['required'] || password?.errors?.['whitespace']">Password is required</span>
          <span *ngIf="password?.errors?.['minlength']">At least 4 characters</span>
        </div>
      </div>

      <div class="error-message global-error" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" class="register-button" [disabled]="registerForm.invalid || isLoading">
        <span *ngIf="!isLoading">Register</span>
        <span *ngIf="isLoading" class="loading-spinner">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none" opacity="0.25"/>
            <path d="M12 2a10 10 0 0 1 10 10" stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round"/>
          </svg>
          Processing...
        </span>
      </button>
    </form>

    <div class="register-footer">
      <p>Already have an account? <a routerLink="/login">Login</a></p>
    </div>
  </div>
</div>
