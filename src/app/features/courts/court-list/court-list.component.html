<div class="court-list-container">
    <div class="leaves-layer" aria-hidden="true">
        <span class="leaf" *ngFor="let i of leafIndices"></span>
    </div>
    <header class="page-header">
        <div class="header-content">
            <div class="header-left">
                <div class="logo">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2L2 7v10c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-10-5z" />
                    </svg>
                </div>
                <div>
                    <h1>Quản Lý Sân Cầu Lông</h1>
                    <p *ngIf="currentUser$ | async as user">Xin chào, <strong>{{ user.displayName }}</strong></p>
                </div>
            </div>
            <button class="logout-button" (click)="logout()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.59L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z" />
                </svg>
                Đăng xuất
            </button>
        </div>
    </header>

    <main class="main-content">
        <div class="content-header">
            <div>
                <h2>Danh Sách Sân</h2>
                <p>Quản lý và theo dõi các sân cầu lông</p>
            </div>
            <button class="add-button" (click)="openAddDialog()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
                </svg>
                Thêm Sân Mới
            </button>
        </div>

        <div class="courts-grid" *ngIf="courts.length > 0">
            <div class="court-card" *ngFor="let court of courts" (click)="navigateToCourt(court)">
                <button type="button" class="court-delete-btn" (click)="deleteCourt($event, court)"
                    [attr.aria-label]="'Xóa sân ' + court.name">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
                    </svg>
                </button>
                <div class="court-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V6h16v12z" />
                        <path d="M12 8v8M8 12h8" stroke="currentColor" stroke-width="1.5" />
                    </svg>
                </div>
                <div class="court-info">
                    <h3>{{ court.name }}</h3>
                    <div class="court-meta">
                        <span class="meta-item">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                                <path
                                    d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z" />
                            </svg>
                            {{ formatDate(court.createdDate) }}
                        </span>
                        <span class="meta-item protected">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                                <path
                                    d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z" />
                            </svg>
                            Bảo mật
                        </span>
                    </div>
                </div>
                <div class="court-arrow">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z" />
                    </svg>
                </div>
            </div>
        </div>

        <div class="empty-state" *ngIf="courts.length === 0">
            <div class="empty-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V6h16v12z" />
                </svg>
            </div>
            <h3>Chưa có sân nào</h3>
            <p>Bắt đầu bằng cách thêm sân cầu lông đầu tiên</p>
            <button class="add-button-large" (click)="openAddDialog()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
                </svg>
                Thêm Sân Mới
            </button>
        </div>
    </main>
</div>

<app-add-court-dialog *ngIf="showAddDialog" (close)="closeAddDialog()"
    (courtAdded)="onCourtAdded()"></app-add-court-dialog>
